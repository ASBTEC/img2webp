name: convertToWebp

on:
  workflow_dispatch:
    inputs:
      email:
        description: 'Recipient email address'
        required: true
      file_url:
        description: 'Google Drive file URL of the zip or image to convert'
        required: true
      filename:
        description: 'Original filename with extension (e.g. photo.png, assets.zip)'
        required: true

env:
  EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
  EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}

jobs:
  convert_to_webp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download input file into input folder
        run: |
          curl -L -o "./input/${{ github.event.inputs.filename }}" "https://drive.usercontent.google.com/u/1/uc?id=${{ github.event.inputs.file_url }}&export=download"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create virtual environment and install dependencies
        run: |
          python3 -m venv venv
          venv/bin/pip install -r requirements.txt

      - name: Convert images to WebP
        run: |
          venv/bin/python src/main.py \
            --input-location ./input \
            --output-location ./output \
            --verbose

      - name: Send output zip by email
        run: |
          chmod u+x src/sendWebp.sh
          ./src/sendWebp.sh "${{ github.event.inputs.email }}"
